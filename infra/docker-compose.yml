# ============================================================
# CHIZLAB Materials — Docker Compose
# ============================================================
# Infrastructure services (postgres, redis, minio) are ready now.
# App services (api, ai-worker, admin) are placeholders that will
# be fully wired in Phase 2 once their Dockerfiles are written.
# ============================================================

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  # CRITICAL: minio_data is a persistent named volume.
  # All uploaded media lives here. Removing this volume = permanent media loss.
  minio_data:

services:

  # ----------------------------------------------------------
  # PostgreSQL (pgvector edition — required for embeddings)
  # ----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chizlab_postgres
    restart: unless-stopped
    networks:
      - app_network
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # Redis (job queue broker, shared by api + ai-worker)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: chizlab_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - app_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ----------------------------------------------------------
  # MinIO (S3-compatible object storage for media files)
  # IMPORTANT: minio_data volume MUST NOT be removed — all
  # uploaded media (images, videos, PDFs, audio) lives here.
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: chizlab_minio
    restart: unless-stopped
    networks:
      - app_network
    ports:
      - "127.0.0.1:9100:9000"   # S3 API
      - "127.0.0.1:9101:9001"   # MinIO web console
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # MinIO bucket initializer — runs once then exits
  # Creates the media bucket and sets download (public-read) policy.
  # ----------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: chizlab_minio_init
    networks:
      - app_network
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET} &&
        mc anonymous set download local/$${MINIO_BUCKET} &&
        echo 'MinIO bucket ready.'
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}

  # ----------------------------------------------------------
  # NestJS API
  # ----------------------------------------------------------
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: chizlab_api
    restart: unless-stopped
    networks:
      - app_network
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Database (individual vars — matches apps/api config.ts)
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_SYNCHRONIZE: "false"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-900}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-604800}
      # Admin
      ADMIN_PIN: ${ADMIN_PIN}
      # Security
      PUBLIC_API_KEY: ${PUBLIC_API_KEY}
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # Python AI Worker
  # ----------------------------------------------------------
  ai-worker:
    build:
      context: ../services/ai-worker
      dockerfile: Dockerfile
    container_name: chizlab_ai_worker
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      INTERNAL_CALLBACK_SECRET: ${INTERNAL_CALLBACK_SECRET}
      INTERNAL_CALLBACK_URL: ${INTERNAL_CALLBACK_URL:-http://api:3000/internal/ai-result}
      INTERNAL_PAGE_PREP_CALLBACK_URL: ${INTERNAL_PAGE_PREP_CALLBACK_URL:-http://api:3000/internal/page-prep-result}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

  # ----------------------------------------------------------
  # React Admin Panel (static build served by nginx)
  # ----------------------------------------------------------
  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    container_name: chizlab_admin
    restart: unless-stopped
    networks:
      - app_network
    ports:
      - "127.0.0.1:${ADMIN_PORT:-80}:80"
    depends_on:
      - api
