name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + unit tests ─────────────────────────────────────────────
  backend-test:
    name: Backend (NestJS) — lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: chizlab
          POSTGRES_PASSWORD: chizlab_test
          POSTGRES_DB: chizlab_test
        options: >-
          --health-cmd "pg_isready -U chizlab -d chizlab_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --forceExit
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: chizlab
          DATABASE_PASSWORD: chizlab_test
          DATABASE_NAME: chizlab_test
          DATABASE_SYNCHRONIZE: 'true'
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: ci_access_secret_not_for_production
          JWT_REFRESH_SECRET: ci_refresh_secret_not_for_production
          JWT_ACCESS_EXPIRES_IN: 900
          JWT_REFRESH_EXPIRES_IN: 604800
          ADMIN_PIN: '12345678'
          PUBLIC_API_KEY: ci_public_key
          INTERNAL_CALLBACK_SECRET: ci_internal_secret
          CORS_ORIGINS: 'http://localhost:5173'
          MINIO_ENDPOINT: 'http://localhost:9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: chizlab-test
          MINIO_PUBLIC_URL: 'http://localhost:9000/chizlab-test'
          NODE_ENV: test

  # ── Frontend: lint + unit tests ────────────────────────────────────────────
  frontend-test:
    name: Frontend (React/Vite) — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Docker image builds ────────────────────────────────────────────────────
  docker-build:
    name: Docker — build all images
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build NestJS API image
        run: docker build -t chizlab-api:ci apps/api/

      - name: Build React admin image
        # Context must be repo root — Dockerfile copies packages/contracts/ and design/
        run: docker build -t chizlab-admin:ci -f apps/admin/Dockerfile .

      - name: Build AI worker image
        run: docker build -t chizlab-ai-worker:ci services/ai-worker/

