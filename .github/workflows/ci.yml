name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Docker image builds ────────────────────────────────────────────────────
  docker-build:
    name: Docker — build all images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build NestJS API image
        run: docker build -t chizlab-api:ci apps/api/

      - name: Build React admin image
        # Context must be repo root — Dockerfile copies packages/contracts/ and design/
        run: docker build -t chizlab-admin:ci -f apps/admin/Dockerfile .

      - name: Build AI worker image
        run: docker build -t chizlab-ai-worker:ci services/ai-worker/

  # ── Deploy to VPS ──────────────────────────────────────────────────────────
  # Requires repository secrets: VPS_HOST, VPS_USER, VPS_PASSWORD
  deploy:
    name: Deploy to VPS
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/chizlab-admin
            git pull origin main
            docker compose -f infra/docker-compose.yml up -d --build
